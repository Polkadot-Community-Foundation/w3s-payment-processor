name: Deploy Frontend

# Single-job build + deploy through this project's deploy.sh wrapper.
#
# All deploys target the Summit network — PCF CI never targets Paseo.
# Production (push to main / manual dispatch) uses a fixed DotNS domain so
# installed hosts and shared links stay stable across releases. PR previews
# also deploy to Summit (each a fresh DotNS registration + Bulletin upload)
# and get a pr<N>- prefix on the same base name.
#
# Deploy CLI: @polkadot-community-foundation/polkadot-app-deploy@0.11.0 — it
# ships the built-in `summit` env. deploy.sh passes --mnemonic (direct signer),
# --config, --js-merkle and --no-transfer-to-signedin-user.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip-cache:
        description: 'Force redeploy (skip cache)'
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deploy-processor-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # npm bug #4828: lockfiles generated on macOS can omit Linux optional
        # native packages. Resolve fresh on the runner so Rollup/PAPI native
        # packages are present for this platform.
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund

      - name: Install deploy tool
        run: npm install -g @polkadot-community-foundation/polkadot-app-deploy@0.11.0

      - name: Resolve deploy target
        id: target
        run: |
          # Summit-only: every branch (PR previews included) deploys to Summit.
          # No path may set paseo-next-v2 — PCF CI never targets Paseo.
          # Summit W3SPayRegistry (deployed by w3spay-admin, owner 5Hn6AMFk…;
          # see summit-net-deployments register). The repo variable
          # VITE_W3SPAY_REGISTRY_ADDRESS_SUMMIT overrides it (e.g. a redeploy);
          # the literal below is the live default so the build is correct even
          # if the var is unset.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "domain=pr${{ github.event.pull_request.number }}-w3spayprocessor.dot" >> "$GITHUB_OUTPUT"
          else
            echo "domain=w3spayprocessor.dot" >> "$GITHUB_OUTPUT"
          fi
          echo "env=summit" >> "$GITHUB_OUTPUT"
          echo "registry=${{ vars.VITE_W3SPAY_REGISTRY_ADDRESS_SUMMIT || '0xf76dadbbc112738275ed398d15c0e8c47b2550f2' }}" >> "$GITHUB_OUTPUT"

      - name: Deploy processor app
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          command: ./deploy.sh "${{ steps.target.outputs.domain }}"
        env:
          # On Summit this MUST be the Bulletin-authorized uploader (e.g. 5Fk8…)
          # that owns w3spayprocessor.dot — it signs both the Bulletin upload
          # and the DotNS bind. PR previews deploy to Summit too, so the same
          # authorized uploader is required for the pr<N>- prefixed names.
          MNEMONIC: ${{ secrets.DOTNS_MNEMONIC }}
          BULLETIN_ENV: ${{ steps.target.outputs.env }}
          VITE_NETWORK: ${{ steps.target.outputs.env }}
          VITE_W3SPAY_REGISTRY_ADDRESS: ${{ steps.target.outputs.registry }}
          NODE_OPTIONS: '--max-old-space-size=8192'
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_ENV: ${{ github.event_name == 'pull_request' && 'preview' || 'production' }}


      - name: Comment on PR
        if: github.event.pull_request
        uses: actions/github-script@v7
        with:
          script: |
            const domain = `pr${{ github.event.pull_request.number }}-w3spayprocessor`;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `**${domain}.dot** (Summit preview) · [logs](${runUrl})\n\nhttps://${domain}.dot.li`
            });
